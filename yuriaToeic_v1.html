<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>ゆりあTOEIC v1</title>
<style>
:root{
  --bg:#f6f5fb; --card:#ffffff; --text:#232228; --muted:#7a7686;
  --primary:#3b5bfd; --primary-dark:#2a42c9; --danger:#e5484d; --success:#2f9e44;
  --warning:#c07a00; --radius:20px; --accent-warm:#ff9f6b; --accent-warm-dark:#e8804a;
}
@media (prefers-color-scheme: dark){
  :root{ --bg:#17161d; --card:#242230; --text:#f0eef5; --muted:#a29dae; --primary:#8098ff; --primary-dark:#6b82e6;
    --accent-warm:#ffab7d; --accent-warm-dark:#ff9257; }
}
*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ margin:0; padding:0; background:var(--bg); color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif; font-size:16px; }
#app{ max-width:480px; margin:0 auto; padding:20px 16px 24px; min-height:100vh; }
h1{ font-size:1.25rem; margin:0 0 12px; }
h2{ font-size:1rem; margin:0 0 10px; }
p{ line-height:1.7; margin:0 0 8px; }
a{ color:inherit; }
.card{ background:var(--card); border-radius:var(--radius); padding:16px; margin-bottom:12px; box-shadow:0 4px 16px rgba(30,20,60,.06); }
.field{ margin-bottom:18px; }
.field:last-child{ margin-bottom:4px; }
.field label{ display:flex; justify-content:space-between; font-weight:600; margin-bottom:6px; font-size:0.875rem; }
input[type=range]{ width:100%; height:32px; accent-color:var(--primary); }
.btn{ display:block; width:100%; min-height:44px; border:none; border-radius:16px; background:var(--primary);
  color:#fff; font-size:1rem; font-weight:700; padding:11px 16px; text-align:center; text-decoration:none;
  cursor:pointer; margin-bottom:8px; }
.btn:disabled{ opacity:.4; }
.btn.secondary{ background:transparent; color:var(--primary); border:1px solid var(--primary); }
.btn.small{ min-height:36px; font-size:0.875rem; width:auto; display:inline-block; padding:8px 14px; }
.actionbar{ position:sticky; bottom:0; left:0; right:0; background:var(--bg); padding:12px 0 0;
  margin-top:8px; box-shadow:0 -6px 10px -6px rgba(0,0,0,.15); }
.badge{ display:inline-block; padding:3px 10px; border-radius:999px; font-size:0.75rem; font-weight:700; margin:0 6px 6px 0; }
.badge.warn{ background:rgba(192,122,0,.15); color:var(--warning); }
.badge.rank{ background:rgba(59,91,253,.15); color:var(--primary); }
.rank-row{ display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(128,128,128,.15); gap:12px; }
.rank-row:last-child{ border-bottom:none; }
.choice-btn{ display:block; width:100%; text-align:left; min-height:48px; border-radius:14px;
  border:1px solid rgba(128,128,128,.35); background:var(--card); color:var(--text); padding:12px 14px;
  margin-bottom:8px; font-size:1rem; cursor:pointer; }
.choice-btn.correct{ background:rgba(47,158,68,.15); border-color:var(--success); }
.choice-btn.incorrect{ background:rgba(229,72,77,.15); border-color:var(--danger); }
.progress{ height:6px; background:rgba(128,128,128,.2); border-radius:3px; overflow:hidden; margin-bottom:16px; }
.progress-fill{ height:100%; background:var(--primary); }
.flashcard{ min-height:180px; display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:1.5rem; font-weight:600; padding:24px; cursor:pointer; }
.day-title{ font-weight:700; margin:20px 0 8px; font-size:0.9375rem; color:var(--muted); }
.day-title:first-of-type{ margin-top:0; }
.muted{ color:var(--muted); font-size:0.875rem; }
.segmented{ display:flex; border:1px solid var(--primary); border-radius:14px; overflow:hidden; margin-bottom:14px; }
.segmented button{ flex:1; padding:10px; border:none; background:transparent; color:var(--primary); font-weight:700; font-size:0.875rem; }
.segmented button.active{ background:var(--primary); color:#fff; }
.center{ text-align:center; }
.row-flex{ display:flex; gap:8px; }
.row-flex .btn{ flex:1; }
details summary{ cursor:pointer; font-weight:600; font-size:0.875rem; margin:8px 0; }
details p, details li{ font-size:0.875rem; }

.icon-row{ display:flex; justify-content:flex-end; gap:10px; margin-bottom:6px; }
.icon-btn{ display:inline-flex; align-items:center; justify-content:center; width:44px; height:44px;
  border-radius:50%; background:var(--card); box-shadow:0 3px 10px rgba(30,20,60,.10); font-size:1.25rem;
  text-decoration:none; color:var(--text); }
.home-title{ text-align:center; font-size:1.375rem; margin:6px 0 2px; }
.streak-line{ text-align:center; color:var(--accent-warm-dark); font-weight:700; font-size:0.875rem; margin:0 0 14px; }
.day-nav{ display:flex; align-items:center; justify-content:space-between; margin:0 0 18px; }
.day-nav-label{ font-size:1.125rem; font-weight:700; text-align:center; flex:1; }
.day-nav-arrow{ width:44px; height:44px; min-height:44px; flex:none; border-radius:50%; border:none;
  background:var(--card); box-shadow:0 3px 10px rgba(30,20,60,.10); font-size:1rem; color:var(--primary);
  cursor:pointer; padding:0; margin-bottom:0; }
.cal-nav{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.cal-dow, .cal-week{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
.cal-dow{ margin-bottom:6px; font-size:0.75rem; color:var(--muted); text-align:center; }
.cal-day{ position:relative; aspect-ratio:1; border:none; border-radius:12px; background:transparent;
  color:var(--text); font-size:0.875rem; cursor:pointer; }
.cal-day.studied{ font-weight:700; }
.cal-day.selected{ background:rgba(59,91,253,.15); }
.cal-day .cal-dot{ position:absolute; bottom:5px; left:50%; transform:translateX(-50%);
  width:5px; height:5px; border-radius:50%; background:var(--primary); }
.cal-day.empty{ pointer-events:none; }
.celebration-overlay{ position:fixed; inset:0; background:rgba(20,15,35,.45); display:flex;
  align-items:center; justify-content:center; z-index:10; padding:24px; cursor:pointer; }
.celebration-card{ background:var(--card); border-radius:var(--radius); padding:32px 24px; text-align:center;
  max-width:320px; box-shadow:0 12px 32px rgba(0,0,0,.25); }
.celebration-card .emoji{ font-size:2.5rem; margin:0 0 8px; }
.explanation-list{ margin:0; padding-left:20px; }
.explanation-list li{ margin-bottom:14px; line-height:1.8; }
.explanation-list li:last-child{ margin-bottom:0; }
.explanation-list li strong{ color:var(--primary); }
.quit-link{ background:none; border:none; color:var(--muted); font-size:0.875rem; text-decoration:underline;
  cursor:pointer; padding:8px; }
</style>
</head>

function cloneData(obj) { return JSON.parse(JSON.stringify(obj)); }

function mergeWithDefaults(parsed) {
  const base = cloneData(DEFAULT_DATA);
  const merged = Object.assign({}, base, parsed);
  merged.user = Object.assign({}, base.user, parsed.user, {
    parts: Object.assign({}, base.user.parts, parsed.user && parsed.user.parts),

  return merged;
}

function load() {

function save(data) {

/* ==================== 5. 診断エンジン ==================== */
function interpolateScoreToAccuracy(score, table) {
  if (score <= table[0].score) return table[0].accuracy;
  if (score >= table[table.length - 1].score) return table[table.length - 1].accuracy;
  for (let i = 0; i < table.length - 1; i++) {
    const a = table[i], b = table[i + 1];
    if (score >= a.score && score <= b.score) {
      const ratio = (score - a.score) / (b.score - a.score);
      return a.accuracy + ratio * (b.accuracy - a.accuracy);
    }
  }
  return table[table.length - 1].accuracy;
}

function calcAccuracyGoalFor(partKey, user, config) {
  if (user.goalMode === 'score') {
    return interpolateScoreToAccuracy(user.goalValue, config.goal.scoreToAccuracyTable);
  }
  return user.goalValue;
}

function calcPriority(partKey, user, config) {
  const current = user.parts[partKey];
  if (current == null) return 0;
  const goal = calcAccuracyGoalFor(partKey, user, config);
  const qCount = config.parts[partKey].questionCount;
  return qCount * Math.max(0, goal - current);
}

function rankParts(user, config) {
  return config.partOrder.map((partKey) => {
    const current = user.parts[partKey];
    const goal = calcAccuracyGoalFor(partKey, user, config);
    return {
      part: partKey,
      label: config.parts[partKey].label,
      questionCount: config.parts[partKey].questionCount,
      current, goal,
      priority: calcPriority(partKey, user, config),
    };
  }).sort((a, b) => b.priority - a.priority);
}

function checkFlags(user, config) {
  const p7a = user.parts.P7A, p7b = user.parts.P7B, p5 = user.parts.P5, p6 = user.parts.P6;
  const p7bTimeSuspect = (p7a != null && p7b != null) && (p7a - p7b >= config.thresholds.p7bTimeSuspectDiff);
  const foundationGate = (p5 != null && p5 < config.thresholds.foundationGateAccuracy) ||
                          (p6 != null && p6 < config.thresholds.foundationGateAccuracy);
  return { p7bTimeSuspect, foundationGate };
}

function runDiagnosis(user, config) {
  const ranking = rankParts(user, config);
  const flags = checkFlags(user, config);
  const phase = flags.foundationGate ? '土台フェーズ' : '処理力フェーズ';
  return { ranking, flags, phase };
}

/* ==================== 6. 週次メニュー生成 ==================== */
function moduleScoresFromRanking(ranking, config) {
  const scores = {};
  ranking.forEach((r) => {
    if (r.priority <= 0) return;
    Object.values(config.modules).forEach((mod) => {
      if (mod.targetParts.includes(r.part)) {
        scores[mod.id] = (scores[mod.id] || 0) + r.priority;
      }
    });
  });
  return scores;
}

function pickModuleQueue(ranking, flags, config) {
  const scores = moduleScoresFromRanking(ranking, config);
  if (flags.foundationGate) {
    scores.grammar = (scores.grammar || 0) + 50;
    scores.vocabulary = (scores.vocabulary || 0) + 50;
  }
  if (flags.p7bTimeSuspect) {
    scores.closeReading = (scores.closeReading || 0) + 30;
  }
  const ids = Object.keys(scores).filter((id) => scores[id] > 0).sort((a, b) => scores[b] - scores[a]);
  return ids.length ? ids : ['speedPractice'];
}

function pickNextGrammarUnit(progress, units) {
  const incomplete = units.find((u) => !(progress.grammar.unitStatus[u.id] && progress.grammar.unitStatus[u.id].completed));
  return incomplete || units[0];
}

function buildDayBlocks(moduleQueue, dayIndex, minutesBudget, config, data) {
  const blocks = [];
  let remaining = minutesBudget;
  const grammarUnit = pickNextGrammarUnit(data.progress, GRAMMAR_UNITS);
  const maxBlocksPerDay = 4;
  let i = 0;
  while (remaining >= config.menuRules.blockMinMinutes && blocks.length < maxBlocksPerDay) {
    const modId = moduleQueue[(dayIndex + i) % moduleQueue.length];
    i++;
    const mod = config.modules[modId];
    const minutes = Math.min(mod.defaultMinutes, Math.max(config.menuRules.blockMinMinutes, remaining), config.menuRules.blockMaxMinutes);
    const block = { moduleId: modId, label: mod.label, kpi: mod.kpiTemplate, minutes };
    if (modId === 'grammar') {
      block.route = `#/grammar/${grammarUnit.id}`;
      block.subLabel = grammarUnit.title;
    } else if (modId === 'vocabulary') {
      block.route = mod.route;
      block.subLabel = `語彙${config.menuRules.vocabQuestionCountPerBlock}問`;
    } else if (mod.contentType === 'methodOnly') {
      block.method = mod.method;
    }
    blocks.push(block);
    remaining -= minutes;
  }
  return blocks;
}

function generateWeeklyMenu(user, config, diagnosis, data) {
  const moduleQueue = pickModuleQueue(diagnosis.ranking, diagnosis.flags, config);
  const perDayMinutes = Math.round(user.timeBudgetMin / 7);
  const days = config.menuRules.dayLabels.map((label, idx) => {
    if (idx === 6) {
      const mod = config.modules[config.menuRules.sundayModule];
      const minutes = Math.min(mod.defaultMinutes, config.menuRules.blockMaxMinutes);
      return { day: label, blocks: [{ moduleId: mod.id, label: mod.label, kpi: mod.kpiTemplate, minutes, method: mod.method, subLabel: '予備／通し演習または休養' }] };
    }
    return { day: label, blocks: buildDayBlocks(moduleQueue, idx, perDayMinutes, config, data) };
  });
  const totalMinutes = days.reduce((sum, d) => sum + d.blocks.reduce((s, b) => s + b.minutes, 0), 0);
  return { phase: diagnosis.phase, generatedDate: new Date().toISOString().slice(0, 10), totalMinutes, days };
}

/* ==================== 7. 語彙モジュール ==================== */
function getWordWeight(word, progress) {
  const wrong = progress.vocab.wrongCounts[word.w] || 0;
  const seen = progress.vocab.seenCounts[word.w] || 0;
  return wrong * 3 + (seen === 0 ? 2 : 0) + 1;
}

function pickQuizWords(count, progress, pool) {
  const candidates = pool.map((w) => ({ word: w, weight: getWordWeight(w, progress) }));
  const picked = [];
  for (let n = 0; n < count && candidates.length; n++) {
    const totalWeight = candidates.reduce((s, c) => s + c.weight, 0);
    let r = Math.random() * totalWeight;
    let idx = 0;
    for (; idx < candidates.length; idx++) {
      r -= candidates[idx].weight;
      if (r <= 0) break;
    }
    idx = Math.min(idx, candidates.length - 1);
    picked.push(candidates[idx].word);
    candidates.splice(idx, 1);
  }
  return picked;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuizQuestion(targetWord, pool) {
  const distractorPool = pool.filter((w) => w.w !== targetWord.w);
  const distractors = shuffle(distractorPool).slice(0, 3).map((w) => w.m);
  const choices = shuffle([targetWord.m, ...distractors]);
  const answerIndex = choices.indexOf(targetWord.m);
  return { word: targetWord, choices, answerIndex };
}

function startVocabQuiz(count) {
  count = count || CONFIG.menuRules.vocabQuestionCountPerBlock;
  const words = pickQuizWords(count, DATA.progress, BUILTIN_VOCAB);
  const questions = words.map((w) => buildQuizQuestion(w, BUILTIN_VOCAB));
  APP_STATE.vocabSession = { questions, index: 0, correct: 0, results: [], answered: false, lastChoiceIndex: null };
}

function submitVocabAnswer(choiceIndex) {
  const session = APP_STATE.vocabSession;
  if (!session || session.answered) return;
  const q = session.questions[session.index];
  const isCorrect = choiceIndex === q.answerIndex;
  const w = q.word.w;
  DATA.progress.vocab.seenCounts[w] = (DATA.progress.vocab.seenCounts[w] || 0) + 1;
  if (!isCorrect) {
    DATA.progress.vocab.wrongCounts[w] = (DATA.progress.vocab.wrongCounts[w] || 0) + 1;
  } else {
    session.correct++;
  }
  session.results.push({ word: q.word, choiceIndex, isCorrect });
  session.answered = true;
  session.lastChoiceIndex = choiceIndex;
  recordDailyActivity(DATA, { vocabQuestionsAnswered: 1 });
  save(DATA);
}

function advanceVocabQuestion() {
  const session = APP_STATE.vocabSession;
  session.index++;
  session.answered = false;
  session.lastChoiceIndex = null;
  if (session.index >= session.questions.length) {
    DATA.progress.vocab.quizHistory.push({ date: getTodayKey(), correct: session.correct, total: session.questions.length });
    recordDailyActivity(DATA, { vocabQuizzesCompleted: 1 });
    const streakInfo = calcCurrentStreak(DATA.progress.dailyLog, new Date());
    const milestone = checkStreakMilestone(DATA, streakInfo, CONFIG);
    if (milestone) APP_STATE.pendingCelebration = milestone;
    save(DATA);
    location.hash = '#/vocab/result';
  } else {
    render();
  }
}

function startFlashcardSession(count) {
  count = count || 20;
  const deck = pickQuizWords(count, DATA.progress, BUILTIN_VOCAB);
  APP_STATE.flashSession = { deck, index: 0, flipped: false };
}

function advanceFlashcard(delta) {
  const s = APP_STATE.flashSession;
  if (!s) return;
  s.index = Math.max(0, Math.min(s.deck.length - 1, s.index + delta));
  s.flipped = false;
  render();
}

/* ==================== 8. 文法モジュール ==================== */
function startGrammarQuiz(unitId) {
  const unit = GRAMMAR_UNITS.find((u) => u.id === unitId);
  APP_STATE.grammarSession = { unitId, index: 0, correct: 0, total: unit.quiz.length, answered: false, lastChoiceIndex: null };
}

function submitGrammarAnswer(choiceIndex) {
  const session = APP_STATE.grammarSession;
  if (!session || session.answered) return;
  const unit = GRAMMAR_UNITS.find((u) => u.id === session.unitId);
  const q = unit.quiz[session.index];
  if (choiceIndex === q.answer) session.correct++;
  session.answered = true;
  session.lastChoiceIndex = choiceIndex;
}

function finishGrammarQuiz() {
  const session = APP_STATE.grammarSession;
  const score = session.correct / session.total;
  const prev = DATA.progress.grammar.unitStatus[session.unitId] || { completed: false, bestScore: 0, attempts: 0, lastScore: 0 };
  DATA.progress.grammar.unitStatus[session.unitId] = {
    completed: true,
    bestScore: Math.max(prev.bestScore, score),
    attempts: prev.attempts + 1,
    lastScore: score,
  };
  recordDailyActivity(DATA, { grammarQuestionsAnswered: session.total, grammarUnitsCompleted: [session.unitId] });
  const streakInfo = calcCurrentStreak(DATA.progress.dailyLog, new Date());
  const milestone = checkStreakMilestone(DATA, streakInfo, CONFIG);
  if (milestone) APP_STATE.pendingCelebration = milestone;
  save(DATA);
}

function advanceGrammarQuestion() {
  const session = APP_STATE.grammarSession;
  const unit = GRAMMAR_UNITS.find((u) => u.id === session.unitId);
  session.index++;
  session.answered = false;
  session.lastChoiceIndex = null;
  if (session.index >= unit.quiz.length) {
    finishGrammarQuiz();
    location.hash = `#/grammar/${unit.id}/result`;
  } else {
    render();
  }
}

function submitP7bPrecisionResult(retestAccuracy) {

/* ==================== 9.5 デイリーログ／ストリーク／カレンダー／統計 ==================== */
function formatLocalDateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}
function getTodayKey(now) { return formatLocalDateKey(now || new Date()); }
// JSのDate#getDay()は日曜=0..土曜=6。dayLabelsの並び(月=0..日=6)に変換する。
function jsDayToAppIndex(jsDay) { return (jsDay + 6) % 7; }

function recordDailyActivity(data, patch, dateKey) {
  const key = dateKey || getTodayKey();
  const log = data.progress.dailyLog;
  const entry = log[key] || { vocabQuestionsAnswered: 0, vocabQuizzesCompleted: 0, grammarQuestionsAnswered: 0, grammarUnitsCompleted: [] };
  if (patch.vocabQuestionsAnswered) entry.vocabQuestionsAnswered += patch.vocabQuestionsAnswered;
  if (patch.vocabQuizzesCompleted) entry.vocabQuizzesCompleted += patch.vocabQuizzesCompleted;
  if (patch.grammarQuestionsAnswered) entry.grammarQuestionsAnswered += patch.grammarQuestionsAnswered;
  if (patch.grammarUnitsCompleted) {
    patch.grammarUnitsCompleted.forEach((id) => { if (!entry.grammarUnitsCompleted.includes(id)) entry.grammarUnitsCompleted.push(id); });
  }
  log[key] = entry;
  return entry;
}

// 純粋関数：dailyLogと基準日(today)を引数で受け取り、内部ではnew Date()を呼ばない(テストしやすくするため)。
function calcCurrentStreak(dailyLog, today) {
  const now = today || new Date();
  const cursor = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const todayKey = formatLocalDateKey(cursor);
  // 今日がまだ未記録でも「昨日までの記録」を有効なストリークとして扱う(今日やる前に途切れて見えないように)。
  if (!dailyLog[todayKey]) cursor.setDate(cursor.getDate() - 1);
  if (!dailyLog[formatLocalDateKey(cursor)]) return { length: 0, startDate: null, endDate: null };
  const endDate = formatLocalDateKey(cursor);
  let length = 0;
  let startDate = endDate;
  while (dailyLog[formatLocalDateKey(cursor)]) {
    length++;
    startDate = formatLocalDateKey(cursor);
    cursor.setDate(cursor.getDate() - 1);
  }
  return { length, startDate, endDate };
}

// data.progress.milestoneStateを更新し、新たに到達したマイルストーン日数があれば返す(無ければnull)。
function checkStreakMilestone(data, streakInfo, config) {
  const state = data.progress.milestoneState;
  if (state.streakStartDate !== streakInfo.startDate) {
    state.streakStartDate = streakInfo.startDate;
    state.celebrated = [];
  }
  const hit = config.streaks.milestones
    .filter((m) => streakInfo.length >= m && !state.celebrated.includes(m))
    .sort((a, b) => b - a)[0];
  if (hit != null) {
    state.celebrated.push(hit);
    return hit;
  }
  return null;
}

function shiftMonth(year, month, delta) {
  const d = new Date(year, month + delta, 1);
  return { year: d.getFullYear(), month: d.getMonth() };
}

// 純粋関数。month は 0-11 (JSの慣例)。月曜始まりでdayLabelsと揃える。
function buildCalendarMonthGrid(year, month, dailyLog) {
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const leadingBlanks = jsDayToAppIndex(new Date(year, month, 1).getDay());
  const cells = [];
  for (let i = 0; i < leadingBlanks; i++) cells.push(null);
  for (let day = 1; day <= daysInMonth; day++) {
    const key = formatLocalDateKey(new Date(year, month, day));
    cells.push({ day, dateKey: key, studied: !!dailyLog[key] });
  }
  while (cells.length % 7 !== 0) cells.push(null);
  return { year, month, cells };
}

function computeVocabStats(progress, allWords) {
  const seenEntries = Object.entries(progress.seenCounts).filter(([, c]) => c > 0);
  return {
    totalWords: allWords.length,
    totalDistinctSeen: seenEntries.length,
    firstExposure: seenEntries.filter(([, c]) => c === 1).length,
    secondPlusExposure: seenEntries.filter(([, c]) => c >= 2).length,
    wrongWordsCount: Object.values(progress.wrongCounts).filter((c) => c > 0).length,
    quizSessionsCompleted: progress.quizHistory.length,
  };
}

function computeGrammarStats(progress, units) {
  const statuses = units.map((u) => progress.unitStatus[u.id]);
  const completed = statuses.filter((s) => s && s.completed);
  return {
    totalUnits: units.length,
    completedCount: completed.length,
    totalAttempts: statuses.reduce((sum, s) => sum + (s ? s.attempts : 0), 0),
    avgBestScore: completed.length ? completed.reduce((sum, s) => sum + s.bestScore, 0) / completed.length : null,
  };
}

/* ==================== 10. ルーター ==================== */
function parseRoute(hash) {
  const path = (hash || '#/input').slice(1);
  const pathname = path.split('?')[0];
  return pathname.split('/').filter(Boolean);
}

function renderInputRoute(app) {
  if (DATA.user.hasTakenToeic == null) return renderExperienceGate(app);
  if (DATA.user.hasTakenToeic === false) return renderBeginnerProfile(app);
  return renderInputForm(app);
}

function render() {
  const segments = parseRoute(location.hash);
  const [root, a, b] = segments;
  const app = document.getElementById('app');
  if (!root) return DATA.history.length > 0 ? renderHome(app) : renderInputRoute(app);
  if (root === 'input') return renderInputRoute(app);
  if (root === 'home') return renderHome(app);
  if (root === 'calendar') return renderCalendar(app);
  if (root === 'settings') return renderSettings(app);
  if (root === 'diagnosis') return renderDiagnosis(app);
  if (root === 'menu') return renderMenu(app);
  if (root === 'grammar') {
    if (!a) return renderGrammarList(app);
    if (a === 'stats') return renderGrammarStats(app);
    if (a && !b) return renderGrammarUnit(app, a);
    if (b === 'quiz') return renderGrammarQuiz(app, a);
    if (b === 'result') return renderGrammarResult(app, a);
  }
  if (root === 'vocab') {
    if (!a) return renderVocabHome(app);
    if (a === 'stats') return renderVocabStats(app);
    if (a === 'flashcards') return renderVocabFlashcards(app);
    if (a === 'quiz') return renderVocabQuiz(app);
    if (a === 'result') return renderVocabResult(app);
  }
  if (root === 'p7b') {
    if (a === 'retest') return renderP7bRetest(app);
    if (a === 'result') return renderP7bResult(app);
  }
  return renderInputRoute(app);
}

/* ==================== 11. 表示ヘルパー ==================== */
function pct(x) { return x == null ? '—' : Math.round(x * 100) + '%'; }

function captureInputForm() {

function renderGrammarQuiz(app, unitId) {
  let session = APP_STATE.grammarSession;
  if (!session || session.unitId !== unitId) {
    startGrammarQuiz(unitId);
    session = APP_STATE.grammarSession;
  }
  const unit = GRAMMAR_UNITS.find((u) => u.id === unitId);
  const q = unit.quiz[session.index];
  const choicesHtml = q.choices.map((c, i) => {
    let cls = 'choice-btn';
    if (session.answered) {
      if (i === q.answer) cls += ' correct';
      else if (i === session.lastChoiceIndex) cls += ' incorrect';
    }
    return `<button class="${cls}" data-action="chooseGrammarAnswer" data-index="${i}" ${session.answered ? 'disabled' : ''}>${c}</button>`;
  }).join('');
  const progressPct = Math.round((session.index / unit.quiz.length) * 100);
  app.innerHTML = `
    <h1>${unit.title}（${session.index + 1}/${unit.quiz.length}）</h1>
    <div class="progress"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="card"><p>${q.q}</p></div>
    ${choicesHtml}
    ${session.answered ? `<p class="muted">${q.note}</p><div class="actionbar"><button class="btn" data-action="nextGrammarQuestion">次へ</button></div>` : ''}
    <p class="center" style="margin-top:12px;"><button class="quit-link" data-action="quitGrammarQuiz">✕ 途中でやめる</button></p>
  `;
}

  const progressPct = Math.round((session.index / session.questions.length) * 100);
  app.innerHTML = `
    <h1>語彙クイズ（${session.index + 1}/${session.questions.length}）</h1>
    <div class="progress"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <div class="card center" style="font-size:1.5rem;">${q.word.w}</div>
    ${choicesHtml}
    ${session.answered ? `<div class="actionbar"><button class="btn" data-action="nextVocabQuestion">次へ</button></div>` : ''}
    <p class="center" style="margin-top:12px;"><button class="quit-link" data-action="quitVocabQuiz">✕ 途中でやめる</button></p>
  `;
}

function renderVocabResult(app) {
  const session = APP_STATE.vocabSession;
  const rows = session.results.map((r) => `
    <div class="rank-row"><span>${r.word.w}</span><span class="muted">${r.isCorrect ? '○' : '× (' + r.word.m + ')'}</span></div>
  `).join('');
  app.innerHTML = `
    <h1>語彙クイズ結果</h1>
    <div class="card center"><p style="font-size:2rem; font-weight:700;">${session.correct}/${session.questions.length}</p></div>
    <div class="card">${rows}</div>
    <div class="actionbar">
      <button class="btn secondary" data-action="startVocabQuiz">もう一度</button>
      <a class="btn" href="#/vocab">語彙メニューに戻る</a>
    </div>
  `;
}

function renderP7bRetest(app) {
  const baseline = DATA.user.parts.P7B;
  app.innerHTML = `
    <h1>精密診断（Part7B）</h1>
    <div class="card">
      <p>手持ちの教材でPart7B（複数文書問題）を、時間無制限で解き直してください。</p>
      <p class="muted">解き終えたら、その正答率を入力してください。（前回の正答率: ${pct(baseline)}）</p>
      <div class="field">
        <label>再テスト正答率 <span id="val-retest">50%</span></label>
        <input type="range" min="0" max="100" step="1" value="50" id="retest-range">
      </div>
    </div>
    <div class="actionbar"><button class="btn" data-action="submitP7bRetest">判定する</button>
    <a class="btn secondary" href="#/diagnosis">診断結果に戻る</a></div>
  `;
  document.getElementById('retest-range').addEventListener('input', (e) => {
    document.getElementById('val-retest').textContent = e.target.value + '%';
  });
}

function renderP7bResult(app) {
  const result = DATA.user.p7bPrecisionResult;
  app.innerHTML = `
    <h1>精密診断の結果</h1>
    <div class="card center">
      <p style="font-size:1.25rem; font-weight:700;">${result.verdict}</p>
      <p class="muted">ベースライン${pct(result.baseline)} → 再テスト${pct(result.retestAccuracy)}（差 ${Math.round(result.diff * 100)}pt）</p>
    </div>
    <div class="actionbar"><a class="btn" href="#/diagnosis">診断結果に戻る</a></div>
  `;
}

/* ==================== 13. イベント委譲 + 起動 ==================== */
const ACTIONS = {
  setHasTakenToeic: (d) => { DATA.user.hasTakenToeic = d.value === 'yes'; save(DATA); render(); },
  setFontScale: (d) => { DATA.settings.fontScale = d.key; save(DATA); applyFontScale(d.key); render(); },
  resetExperienceGate: () => { DATA.user.hasTakenToeic = null; save(DATA); render(); },
  setSelfLevel: (d) => { DATA.user.beginnerProfile.selfLevel = d.key; render(); },
  submitBeginnerProfile: () => {
    const p = DATA.user.beginnerProfile;
    if (!p.selfLevel) return;
    p.eikenLevel = document.getElementById('eiken-select').value;
    p.experienceNote = document.getElementById('experience-note').value;
    const levelDef = CONFIG.selfDiagnosisLevels.find((lv) => lv.key === p.selfLevel);
    const acc = interpolateScoreToAccuracy(levelDef.score, CONFIG.goal.scoreToAccuracyTable);
    CONFIG.partOrder.forEach((pk) => { DATA.user.parts[pk] = acc; });
    const diagnosis = runDiagnosis(DATA.user, CONFIG);
    DATA.user.flags = diagnosis.flags;
    DATA.history.push({ date: new Date().toISOString().slice(0, 10), parts: Object.assign({}, DATA.user.parts), note: '自己診断（' + levelDef.label + '）' });
    APP_STATE.diagnosis = diagnosis;
    APP_STATE.weeklyMenu = null;
    save(DATA);
    location.hash = '#/diagnosis';
  },
  setGoalMode: (d) => { captureInputForm(); DATA.user.goalMode = d.mode; render(); },
  submitInput: () => {
    captureInputForm();
    const goalFixedRange = document.getElementById('goal-fixed-range');
    const goalScoreRange = document.getElementById('goal-score-range');
    if (DATA.user.goalMode === 'fixed' && goalFixedRange) DATA.user.goalValue = Number(goalFixedRange.value) / 100;
    if (DATA.user.goalMode === 'score' && goalScoreRange) DATA.user.goalValue = Number(goalScoreRange.value);
    const diagnosis = runDiagnosis(DATA.user, CONFIG);
    DATA.user.flags = diagnosis.flags;
    DATA.history.push({ date: new Date().toISOString().slice(0, 10), parts: Object.assign({}, DATA.user.parts), note: '' });
    APP_STATE.diagnosis = diagnosis;
    APP_STATE.weeklyMenu = null;
    save(DATA);
    location.hash = '#/diagnosis';
  },
  reportP7b: (d) => { setP7bSelfReport(d.status); render(); },
  regenerateMenu: () => { APP_STATE.weeklyMenu = null; render(); },
  startGrammarQuiz: (d) => { startGrammarQuiz(d.unitId); location.hash = `#/grammar/${d.unitId}/quiz`; },
  chooseGrammarAnswer: (d) => { submitGrammarAnswer(Number(d.index)); render(); },
  nextGrammarQuestion: () => { advanceGrammarQuestion(); },
  quitGrammarQuiz: () => {
    const unitId = APP_STATE.grammarSession ? APP_STATE.grammarSession.unitId : null;
    APP_STATE.grammarSession = null;
    location.hash = unitId ? `#/grammar/${unitId}` : '#/grammar';
  },
  startVocabFlashcards: () => { startFlashcardSession(20); location.hash = '#/vocab/flashcards'; },
  startVocabQuiz: () => { startVocabQuiz(CONFIG.menuRules.vocabQuestionCountPerBlock); location.hash = '#/vocab/quiz'; render(); },
  chooseVocabAnswer: (d) => { submitVocabAnswer(Number(d.index)); render(); },
  nextVocabQuestion: () => { advanceVocabQuestion(); },
  quitVocabQuiz: () => { APP_STATE.vocabSession = null; location.hash = '#/vocab'; },
  flipCard: () => { APP_STATE.flashSession.flipped = !APP_STATE.flashSession.flipped; render(); },
  nextCard: () => { advanceFlashcard(1); },
  prevCard: () => { advanceFlashcard(-1); },
  submitP7bRetest: () => {
    const val = Number(document.getElementById('retest-range').value) / 100;
    submitP7bPrecisionResult(val);
    location.hash = '#/p7b/result';
  },
  shiftHomeDay: (d) => {
    const cur = APP_STATE.selectedDayIndex ?? jsDayToAppIndex(new Date().getDay());
    APP_STATE.selectedDayIndex = ((cur + Number(d.delta)) % 7 + 7) % 7;
    render();
  },
  dismissCelebration: () => { render(); },
  shiftCalendarMonth: (d) => {
    const s = shiftMonth(APP_STATE.calendarYear, APP_STATE.calendarMonth, Number(d.delta));
    APP_STATE.calendarYear = s.year;
    APP_STATE.calendarMonth = s.month;
    APP_STATE.selectedCalendarDay = null;
    render();
  },
  selectCalendarDay: (d) => {
    APP_STATE.selectedCalendarDay = APP_STATE.selectedCalendarDay === d.date ? null : d.date;
    render();
  },
};

if (typeof window !== 'undefined') {
  window.addEventListener('DOMContentLoaded', () => {
    DATA = load();
    applyFontScale(DATA.settings.fontScale);
    document.getElementById('app').addEventListener('click', (e) => {
      const el = e.target.closest('[data-action]');
      if (!el) return;
      const handler = ACTIONS[el.dataset.action];
      if (handler) handler(el.dataset, e);
    });
    if (!location.hash) location.hash = DATA.history.length > 0 ? '#/home' : '#/input';
    render();
    window.addEventListener('hashchange', render);
  });
}
</script>
</body>
</html>
